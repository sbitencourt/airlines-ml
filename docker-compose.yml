version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: mongo-airlines-ml
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: passwd
    volumes:
      - ./data/mongodb_data:/data/db
    ports:
      - "27017:27017"

  postgres:
    image: postgres:16-alpine
    container_name: postgres-airlines-ml
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: passwd
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init:/docker-entrypoint-initdb.d


  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: dst_fastapi
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - postgres

  streamlit:
      build:
        context: .
        dockerfile: Dockerfile.streamlit
      container_name: dst_streamlit
      env_file:
        - .env.docker
      environment:
        FASTAPI_URL: "http://fastapi:8000"
      ports:
        - "8501:8501"
      depends_on:
        - fastapi

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-webserver
    depends_on:
      - postgres
      - mongodb
    env_file:
    - .env.docker
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: "test_fernet_key"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:passwd@postgres:5432/airflow

      PYTHONPATH: /opt/airflow/project/src

      ENV_FILE: /opt/airflow/project/.env.docker

      DST_AIRLINES_HOME: /opt/airflow/project

    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - ./logs/airflow:/opt/airflow/logs

    ports:
      - "8080:8080"

    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-scheduler
    depends_on:
      - postgres
      - mongodb
    env_file:
    - .env.docker
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: "test_fernet_key"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs

      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:passwd@postgres:5432/airflow

      PYTHONPATH: /opt/airflow/project/src

      ENV_FILE: /opt/airflow/project/.env.docker

      DST_AIRLINES_HOME: /opt/airflow/project

    volumes:
      - ./dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - ./logs/airflow:/opt/airflow/logs

    command: scheduler

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://root:passwd@postgres:5432/airflow

      DST_AIRLINES_HOME: /opt/airflow/project
      
    volumes:
      - ./:/opt/airflow/project
    entrypoint: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com"

  pushgateway:
    image: prom/pushgateway
    ports:
      - "9091:9091"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - postgres