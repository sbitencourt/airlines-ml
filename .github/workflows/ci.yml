name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and compile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"

      - name: Install quality tools
        run: pip install ruff
        shell: bash

      - name: Lint
        run: ruff check src etl scripts tests
        shell: bash

      - name: Compile check
        run: python -m compileall src etl scripts tests
        shell: bash

  unit-tests:
    name: Unit tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
          requirements-file: "etl/requirements.txt"

      - name: Install test tools
        run: pip install pytest
        shell: bash

      - name: Run unit tests
        run: python -m pytest -q tests/unit
        shell: bash

  integration-tests:
    name: Integration tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongo:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: root
          MONGO_INITDB_ROOT_PASSWORD: passwd
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' -u root -p passwd --authenticationDatabase admin"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
          requirements-file: "requirements.txt"

      - name: Install test tools
        run: pip install pytest
        shell: bash

      - name: Run integration tests
        shell: bash
        env:
          MONGODB_URI: mongodb://root:passwd@localhost:27017/?authSource=admin
          MONGODB_DB: test_db
          MONGODB_COLLECTION: test_flights
        run: python -m pytest -q tests/integration