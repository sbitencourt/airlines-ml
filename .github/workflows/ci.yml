name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"

      - name: Install quality tools
        run: pip install ruff
        shell: bash

      - name: Lint
        run: ruff check src etl scripts tests
        shell: bash

      - name: Compile check
        run: python -m compileall src etl scripts
        shell: bash

  tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
          requirements-path: "etl/requirements.txt"

      - name: Install test tools
        run: pip install pytest
        shell: bash

      - name: Run tests
        shell: bash
        run: |
          set +e
          python -m pytest -q
          exit_code=$?
          if [ "$exit_code" -eq 5 ]; then
            echo "No tests collected yet; treating as success."
            exit 0
          fi
          exit "$exit_code"