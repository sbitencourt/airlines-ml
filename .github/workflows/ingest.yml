name: Manual Aviationstack Ingest

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-ingest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest:
    name: Run manual ingest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate source config
        uses: ./.github/actions/validate-source-config
        with:
          source-name: "aviationstack"
          api-url-var: "API_URL_AVIATIONSTACK_FLIGHTS"
          credential-var: "AVIATIONSTACK_API_KEY_ENCRYPTED"
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          API_URL_AVIATIONSTACK_FLIGHTS: ${{ vars.API_URL_AVIATIONSTACK_FLIGHTS }}
          AVIATIONSTACK_API_KEY_ENCRYPTED: ${{ secrets.AVIATIONSTACK_API_KEY_ENCRYPTED }}

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
          requirements-file: "etl/requirements.txt"

      - name: Set up MongoDB
        uses: ./.github/actions/setup-mongodb

      - name: Extract Aviationstack data
        run: python etl/extract/aviationstack.py
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          API_URL_AVIONSTACK_FLIGHTS: ${{ vars.API_URL_AVIONSTACK_FLIGHTS }}
          AVIATIONSTACK_API_KEY_ENCRYPTED: ${{ secrets.AVIATIONSTACK_API_KEY_ENCRYPTED }}

      - name: Verify raw output
        run: |
          shopt -s nullglob
          files=(data/raw/aviationstack_raw*.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "[verify-raw] No raw files were generated."
            exit 1
          fi

          echo "[verify-raw] Raw files found: ${#files[@]}"
          ls -lah data/raw

      - name: Transform raw to incoming
        run: python etl/transform/aviationstack_to_incoming.py

      - name: Verify incoming output
        run: |
          shopt -s nullglob
          files=(data/incoming/aviationstack_incoming*.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "[verify-incoming] No incoming files were generated."
            exit 1
          fi

          echo "[verify-incoming] Incoming files found: ${#files[@]}"
          ls -lah data/incoming

      - name: Upload raw data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aviationstack-raw
          path: data/raw/aviationstack_raw*.json
          if-no-files-found: warn

      - name: Upload incoming data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aviationstack-incoming
          path: data/incoming/aviationstack_incoming*.json
          if-no-files-found: warn

      - name: Load incoming data to MongoDB
        run: python etl/load/to_mongo.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB: ${{ vars.MONGODB_DB }}
          MONGODB_COLLECTION: ${{ vars.MONGODB_COLLECTION }}

      - name: Verify processed output
        run: |
          shopt -s nullglob
          files=(data/processed/*.json)

          if [ ${#files[@]} -eq 0 ]; then
            echo "[verify-processed] No processed files were generated."
            exit 1
          fi

          echo "[verify-processed] Processed files found: ${#files[@]}"
          ls -lah data/processed

      - name: Upload processed data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aviationstack-processed
          path: data/processed/*.json
          if-no-files-found: warn