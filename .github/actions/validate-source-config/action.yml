name: "Validate Source Config"
description: "Validate required environment variables for a data source"

inputs:
  source-name:
    description: "Source name"
    required: true
  api-url-var:
    description: "Name of the API URL environment variable"
    required: true
  credential-var:
    description: "Name of the credential environment variable (can be encrypted)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate base environment
      shell: bash
      run: |
        set -euo pipefail

        if [ -z "${ENCRYPTION_KEY:-}" ]; then
          echo "[validate-source-config] Missing ENCRYPTION_KEY (required for decryption)."
          exit 1
        fi

        echo "[validate-source-config] Base environment OK."

    - name: Validate source-specific environment
      shell: bash
      run: |
        set -euo pipefail

        SOURCE_NAME="${{ inputs.source-name }}"
        API_URL_VAR="${{ inputs.api-url-var }}"
        CREDENTIAL_VAR="${{ inputs.credential-var }}"

        if [ -z "$SOURCE_NAME" ]; then
          echo "[validate-source-config] Input 'source-name' is required."
          exit 1
        fi

        if [ -z "$API_URL_VAR" ]; then
          echo "[validate-source-config] Input 'api-url-var' is required."
          exit 1
        fi

        if [ -z "$CREDENTIAL_VAR" ]; then
          echo "[validate-source-config] Input 'credential-var' is required."
          exit 1
        fi

        API_URL_VALUE="${!API_URL_VAR:-}"
        CREDENTIAL_VALUE="${!CREDENTIAL_VAR:-}"

        if [ -z "$API_URL_VALUE" ]; then
          echo "[validate-source-config] Missing required variable '$API_URL_VAR' for source '$SOURCE_NAME'."
          exit 1
        fi

        if [ -z "$CREDENTIAL_VALUE" ]; then
          echo "[validate-source-config] Missing required variable '$CREDENTIAL_VAR' for source '$SOURCE_NAME'."
          exit 1
        fi

        if [[ ! "$API_URL_VALUE" =~ ^https?:// ]]; then
          echo "[validate-source-config] Variable '$API_URL_VAR' must be a valid HTTP/HTTPS URL. Current value: '$API_URL_VALUE'"
          exit 1
        fi

        if [[ "$CREDENTIAL_VALUE" =~ ^[[:space:]]*$ ]]; then
          echo "[validate-source-config] Variable '$CREDENTIAL_VAR' is empty or whitespace only for source '$SOURCE_NAME'."
          exit 1
        fi

        echo "[validate-source-config] Source: $SOURCE_NAME"
        echo "[validate-source-config] API URL variable: $API_URL_VAR"
        echo "[validate-source-config] Credential variable: $CREDENTIAL_VAR"
        echo "[validate-source-config] Source-specific environment OK."