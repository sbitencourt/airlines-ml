name: Manual Aviationstack Airlines Ingest

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-ingest-airlines-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest:
    name: Run manual airlines ingest
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    env:
      SOURCE_NAME: aviationstack_airlines
      RAW_DIR: data/raw
      INCOMING_DIR: data/incoming
      PROCESSED_DIR: data/processed
      RAW_PATTERN: data/raw/aviationstack_airlines_raw*.json
      INCOMING_PATTERN: data/incoming/aviationstack_airlines_incoming*.json
      PROCESSED_PATTERN: data/processed/aviationstack_airlines_incoming*.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Record pipeline start time
        run: echo "PIPELINE_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - name: Validate source config
        uses: ./.github/actions/validate-source-config
        with:
          source-name: "aviationstack_airlines"
          api-url-var: "API_URL_AVIATIONSTACK_AIRLINES"
          credential-var: "AVIATIONSTACK_API_KEY_ENCRYPTED"
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          API_URL_AVIATIONSTACK_AIRLINES: ${{ vars.API_URL_AVIATIONSTACK_AIRLINES }}
          AVIATIONSTACK_API_KEY_ENCRYPTED: ${{ secrets.AVIATIONSTACK_API_KEY_ENCRYPTED }}

      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
          requirements-file: "requirements.txt"

      - name: Set up MongoDB
        uses: ./.github/actions/setup-mongodb

      - name: Extract Aviationstack airlines data
        run: python src/dst_airlines/etl/extract/aviationstack_airlines.py
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          API_URL_AVIATIONSTACK_AIRLINES: ${{ vars.API_URL_AVIATIONSTACK_AIRLINES }}
          AVIATIONSTACK_API_KEY_ENCRYPTED: ${{ secrets.AVIATIONSTACK_API_KEY_ENCRYPTED }}

      - name: Verify raw output
        run: |
          shopt -s nullglob
          files=($RAW_PATTERN)

          if [ ${#files[@]} -eq 0 ]; then
            echo "[verify-raw] No raw files were generated."
            exit 1
          fi

          echo "RAW_FILE_COUNT=${#files[@]}" >> "$GITHUB_ENV"
          echo "[verify-raw] Raw files found: ${#files[@]}"
          ls -lah "$RAW_DIR"

      - name: Transform raw to incoming
        run: python src/dst_airlines/etl/transform/aviationstack_to_incoming.py

      - name: Verify incoming output
        run: |
          shopt -s nullglob
          files=($INCOMING_PATTERN)

          if [ ${#files[@]} -eq 0 ]; then
            echo "[verify-incoming] No incoming files were generated."
            exit 1
          fi

          echo "INCOMING_FILE_COUNT=${#files[@]}" >> "$GITHUB_ENV"
          echo "[verify-incoming] Incoming files found: ${#files[@]}"
          ls -lah "$INCOMING_DIR"

      - name: Upload raw data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aviationstack-airlines-raw
          path: ${{ env.RAW_PATTERN }}
          if-no-files-found: warn

      - name: Upload incoming data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aviationstack-airlines-incoming
          path: ${{ env.INCOMING_PATTERN }}
          if-no-files-found: warn

      - name: Load incoming airlines data to MongoDB
        run: python src/dst_airlines/etl/load/to_mongo_airlines.py
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: ${{ vars.MONGODB_DB }}
          MONGODB_COLLECTION: ${{ vars.MONGODB_COLLECTION_AIRLINES }}

      - name: Verify processed output
        run: |
          shopt -s nullglob
          files=($PROCESSED_PATTERN)

          if [ ${#files[@]} -eq 0 ]; then
            echo "[verify-processed] No processed files were generated."
            exit 1
          fi

          echo "PROCESSED_FILE_COUNT=${#files[@]}" >> "$GITHUB_ENV"
          echo "[verify-processed] Processed files found: ${#files[@]}"
          ls -lah "$PROCESSED_DIR"

      - name: Upload processed data artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aviationstack-airlines-processed
          path: ${{ env.PROCESSED_PATTERN }}
          if-no-files-found: warn

      - name: Pipeline summary
        if: always()
        run: |
          ended_at=$(date +%s)
          started_at=${PIPELINE_STARTED_AT:-$ended_at}
          duration=$((ended_at - started_at))

          echo "=== PIPELINE SUMMARY ==="
          echo "source: ${SOURCE_NAME}"
          echo "raw files: ${RAW_FILE_COUNT:-0}"
          echo "incoming files: ${INCOMING_FILE_COUNT:-0}"
          echo "processed files: ${PROCESSED_FILE_COUNT:-0}"
          echo "duration_seconds: ${duration}"

          {
            echo "## Pipeline Summary"
            echo ""
            echo "- Source: ${SOURCE_NAME}"
            echo "- Raw files: ${RAW_FILE_COUNT:-0}"
            echo "- Incoming files: ${INCOMING_FILE_COUNT:-0}"
            echo "- Processed files: ${PROCESSED_FILE_COUNT:-0}"
            echo "- Duration (s): ${duration}"
          } >> "$GITHUB_STEP_SUMMARY"